{% extends 'base.html' %}

{% block title %}Admin Login — NEURAL_FEED{% endblock %}

{% block content %}
<div class="auth-page" style="background:var(--black);">
  <div class="auth-card" style="border-color:var(--yellow);box-shadow:6px 6px 0 var(--yellow);">
    <div style="text-align:center;margin-bottom:32px;">
      <span style="display:inline-flex;width:56px;height:56px;background:var(--yellow);border:var(--border3);border-radius:var(--radius);align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:16px;">
        <i class="fas fa-terminal"></i>
      </span>
      <h2>ADMIN_PORTAL</h2>
      <p class="subtitle" style="font-family:monospace;">[ NEURAL_FEED :: CTF_LAB ]</p>
    </div>

    {% if error %}
    <div class="alert alert-error mb-24" style="font-family:monospace;font-size:0.85rem;">
      <i class="fas fa-exclamation-triangle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" style="font-family:monospace;">USERNAME</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus
               style="font-family:monospace;">
      </div>
      <div class="form-group">
        <label class="form-label" style="font-family:monospace;">PASSWORD</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required
               style="font-family:monospace;">
      </div>
      <button type="submit" class="btn btn-yellow" style="width:100%;justify-content:center;padding:14px;font-family:monospace;">
        ACCESS_SYSTEM <i class="fas fa-sign-in-alt"></i>
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.82rem;color:#888;">
      <a href="/" style="color:#aaa;font-family:monospace;">← Return to site</a>
    </p>
  </div>
</div>
{% endblock %}
