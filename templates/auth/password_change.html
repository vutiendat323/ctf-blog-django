{% extends 'base.html' %}
{% block title %}Change Password — NEURAL_FEED{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2 style="margin-bottom:8px;">CHANGE PASSWORD</h2>
    <p class="subtitle">Choose a new strong password</p>
    <form method="POST" style="margin-top:24px;">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label class="form-label">{{ field.label }}</label>
        <input type="password" name="{{ field.html_name }}" class="form-control" required>
        {% if field.errors %}<p style="color:var(--red);font-size:0.8rem;margin-top:4px;">{{ field.errors|join:" " }}</p>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-yellow" style="width:100%;justify-content:center;">Save Password</button>
    </form>
  </div>
</div>
{% endblock %}
