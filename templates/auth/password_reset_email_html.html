<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;background:#F5F2EB;padding:40px;color:#0A0A0A;">
  <div style="max-width:500px;margin:0 auto;background:#fff;border:3px solid #0A0A0A;border-radius:6px;padding:40px;">
    <h2 style="font-size:1.5rem;text-transform:uppercase;margin-bottom:16px;">Reset Your Password</h2>
    <p style="margin-bottom:16px;">Hi <strong>{{ user.username }}</strong>,</p>
    <p style="margin-bottom:24px;">You requested a password reset. Click the button below:</p>
    <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
       style="display:inline-block;background:#E8D44D;border:3px solid #0A0A0A;padding:12px 28px;font-weight:700;text-transform:uppercase;text-decoration:none;color:#0A0A0A;border-radius:6px;">
      Reset Password
    </a>
    <p style="margin-top:24px;font-size:0.85rem;color:#888;">
      This link expires in 24 hours. If you didn't request this, ignore this email.
    </p>
    <hr style="border:1px solid #eee;margin:24px 0;">
    <p style="font-size:0.8rem;color:#aaa;">— NEURAL_FEED Team</p>
  </div>
</body>
</html>
