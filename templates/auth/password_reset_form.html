{% extends 'base.html' %}
{% block title %}Reset Password — NEURAL_FEED{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2 style="margin-bottom:8px;">RESET PASSWORD</h2>
    <p class="subtitle">Enter your email and we'll send a reset link.</p>
    <form method="POST" style="margin-top:24px;">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-yellow" style="width:100%;justify-content:center;">
        Send Reset Link <i class="fas fa-paper-plane"></i>
      </button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:0.88rem;">
      <a href="/auth/login/" style="font-weight:700;">← Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
