{% extends 'base.html' %}
{% block title %}Check Your Email — NEURAL_FEED{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="text-align:center;">
    <i class="fas fa-envelope-open" style="font-size:3rem;color:var(--yellow);display:block;margin-bottom:20px;"></i>
    <h2 style="margin-bottom:12px;">CHECK YOUR EMAIL</h2>
    <p style="color:#666;margin-bottom:8px;">We've sent a password reset link to your email address.</p>
    <p style="color:#888;font-size:0.88rem;">Didn't get it? Check your spam folder.</p>
    <a href="/auth/login/" class="btn btn-yellow mt-24">Back to Login</a>
  </div>
</div>
{% endblock %}
