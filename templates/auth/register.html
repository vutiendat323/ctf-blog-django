{% extends 'base.html' %}

{% block title %}Register — NEURAL_FEED{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:480px;">
    <div style="text-align:center;margin-bottom:32px;">
      <span style="display:inline-flex;width:56px;height:56px;background:var(--yellow);border:var(--border3);border-radius:var(--radius);align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:16px;">
        <i class="fas fa-user-plus"></i>
      </span>
      <h2>CREATE ACCOUNT</h2>
      <p class="subtitle">Join NEURAL_FEED and join the conversation</p>
    </div>

    {% if error %}
    <div class="alert alert-error mb-24">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="your_username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password1" class="form-control" placeholder="Min 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-yellow" style="width:100%;justify-content:center;padding:14px;">
        Create Account <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:0.88rem;color:#666;">
      Already have an account?
      <a href="/auth/login/" style="font-weight:700;color:var(--black);">Log In</a>
    </p>
  </div>
</div>
{% endblock %}
